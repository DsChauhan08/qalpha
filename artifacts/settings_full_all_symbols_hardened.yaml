version: 1.0.0

data:
  primary_source: yfinance
  cache_enabled: true
  cache_ttl_hours: 24
  universe_limit: 0
  default_universe:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA

backtest:
  initial_capital: 100000
  commission_rate: 0.001
  slippage_bps: 5
  min_commission: 1.0

risk:
  max_position_size: 0.05
  max_portfolio_leverage: 1.0
  max_drawdown: 0.10
  hard_drawdown_limit: 0.20
  hard_drawdown_action: flatten
  hard_drawdown_cooldown_days: 20
  hard_drawdown_recovery_level: 0.10
  hard_drawdown_require_positive_quant_ir: true
  hard_drawdown_ir_lookback_bars: 63
  core_drawdown_scaling_enabled: true
  core_min_exposure_in_drawdown: 0.35
  max_daily_loss: 0.03
  max_weekly_loss: 0.07
  var_confidence: 0.95
  kelly_fraction: 0.6
  target_volatility: 0.11
  vol_of_vol_threshold: 0.03
  vol_of_vol_scale: 0.6
  dd_warning: 0.12
  dd_critical: 0.18
  dd_circuit_breaker: 0.25
  dd_max_limit: 0.30
  dd_min_exposure: 0.10
  dd_leverage_cap_warning: 0.80
  dd_leverage_cap_critical: 0.60
  market_off_leverage_cap: 0.70
  faster_derisk_warning_mult: 0.70
  faster_derisk_critical_mult: 0.50

strategy:
  lookback_window: 60
  signal_threshold: 0.28
  rebalance_frequency: weekly
  paper_rebalance_frequency: weekly
  min_rebalance_notional_frac: 0.015
  momentum_top_pct: 80
  momentum_bottom_pct: 35
  relative_strength_top_n: 60
  relative_strength_min_mom: -0.02
  use_relative_strength: true
  liquid_subset_size: 0
  liquid_adv_window: 20
  liquid_min_history: 120
  liquid_for_full_only: false
  long_only: true
  risk_off_cash: false
  signal_scale: 1.9
  enhanced_debug_components: false
  min_long_signal: 0.25
  market_off_scale: 0.60
  anchor_core_to_quant_composite: false
  alpha_deploy_requires_relative_edge: true
  alpha_edge_lookback_days: 63
  alpha_min_scale: 0.0
  alpha_info_floor: 0.0
  alpha_excess_floor: 0.0
  alpha_recovery_info: 0.25
  alpha_recovery_excess: 0.03
  sleeves:
    enabled: true
    core_budget: 0.92
    alpha_budget: 0.07
    lottery_budget: 0.01
    core_loss_scale: 0.45
    core_tilt_enabled: false
    core_tilt_lookback_days: 126
    core_tilt_strength: 0.35
    core_rebalance_band: 0.02
    alpha_min_confidence: 0.05
    lottery_top_n: 3
    lottery_min_signal: 0.35
    lottery_min_confidence: 0.25
    lottery_stop_loss: 0.08
    lottery_max_per_symbol: 0.0075
    core_mix:
      SPY: 0.50
      QQQ: 0.30
      IWM: 0.20

indicators:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  atr_period: 14

logging:
  level: INFO
  file: quantum_alpha.log

benchmarks:
  market: SPY
  quant_composite:
    - QQQ
    - IWM
  quant_firm_proxies:
    enabled: true
    profiles:
      - aqr_style_factors
      - citadel_style_multistrat
      - two_sigma_style_data
      - de_shaw_style_macro
      - man_ahl_style_trend
    min_assets: 2
    interval: 1d

validation:
  mcpt_threshold_stage1: 0.10
  mcpt_threshold_stage2: 0.05
  rolling_oos_window_days: 126
  rolling_oos_min_windows: 3
  rolling_oos_min_beat_ratio: 0.75
  promotion_oos_required_windows: 4
  promotion_oos_required_beats: 3
  paper_min_bars: 120
  constraint_max_drawdown: 0.20
  constraint_beta_min: 0.8
  constraint_beta_max: 1.2
  constraint_min_information_ratio: 0.10
  constraint_min_excess_total_return_vs_quant: 0.0
