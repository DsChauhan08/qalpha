# Meta-Ensemble Strategy Configuration
# ======================================
# Optimized for the meta-ensemble model's own signal generation.
# - Daily rebalancing (model predicts daily direction)
# - No momentum/relative-strength filter (model has its own signals)
# - Long+short allowed (model signals both directions)
# - signal_scale=1.0 (model probabilities are already calibrated)
version: "1.0.0"

# Data Sources
data:
  primary_source: "yfinance"
  cache_enabled: true
  cache_ttl_hours: 24
  universe_limit: 0  # 0 = no limit. Use --symbols SP500/FULL tokens in CLI
  default_universe:
    # Quick-test preset (6 tickers). For full universe, use: --symbols FULL
    - "SPY"
    - "AAPL"
    - "MSFT"
    - "GOOGL"
    - "AMZN"
    - "META"

# Backtesting
backtest:
  initial_capital: 100000
  commission_rate: 0.001
  slippage_bps: 5
  min_commission: 1.0

# Risk Management
risk:
  max_position_size: 0.05
  max_portfolio_leverage: 1.0
  max_drawdown: 0.15
  var_confidence: 0.95
  kelly_fraction: 0.5
  target_volatility: 0.10
  vol_of_vol_threshold: 0.03
  vol_of_vol_scale: 0.6
  dd_warning: 0.10
  dd_critical: 0.16
  dd_circuit_breaker: 0.25
  dd_max_limit: 0.30
  dd_min_exposure: 0.10
  dd_leverage_cap_warning: 0.65
  dd_leverage_cap_critical: 0.45
  market_off_leverage_cap: 0.50

# Strategy — tuned for meta-ensemble
strategy:
  lookback_window: 60
  signal_threshold: 0.01
  rebalance_frequency: "daily"
  use_relative_strength: false
  liquid_subset_size: 200
  liquid_adv_window: 20
  liquid_min_history: 120
  liquid_for_full_only: true
  long_only: true
  risk_off_cash: false
  signal_scale: 1.0
  min_long_signal: 0.0
  market_off_scale: 1.0

# Technical Indicators
indicators:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  atr_period: 14

# Logging
logging:
  level: "INFO"
  file: "quantum_alpha.log"

# Benchmarks
benchmarks:
  market: "SPY"
  quant_composite:
    - "QQQ"
    - "IWM"
  quant_firm_proxies:
    enabled: true
    profiles:
      - "aqr_style_factors"
      - "citadel_style_multistrat"
      - "two_sigma_style_data"
      - "de_shaw_style_macro"
      - "man_ahl_style_trend"
    min_assets: 2
    interval: "1d"

validation:
  mcpt_threshold_stage1: 0.10
  mcpt_threshold_stage2: 0.05
  rolling_oos_window_days: 126
  rolling_oos_min_windows: 3
  rolling_oos_min_beat_ratio: 0.75
  promotion_oos_required_windows: 4
  promotion_oos_required_beats: 3
  paper_min_bars: 120
  constraint_max_drawdown: 0.25
  constraint_beta_min: 0.8
  constraint_beta_max: 1.2
  constraint_min_information_ratio: 0.0
