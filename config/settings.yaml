# Quantum Alpha V1 Configuration
version: "1.0.0"

# Data Sources
data:
  primary_source: "yfinance"
  cache_enabled: true
  cache_ttl_hours: 24
  universe_limit: 0  # 0 = no limit. Use --symbols SP500/FULL/LIQUID tokens in CLI
  default_universe:
    # Quick-test preset (10 tickers). For full universe, use: --symbols FULL
    - "SPY"
    - "QQQ"
    - "IWM"
    - "AAPL"
    - "MSFT"
    - "GOOGL"
    - "AMZN"
    - "NVDA"
    - "META"
    - "TSLA"
  openbb:
    enabled: false
    free_only: true
    provider: "yfinance"
    sdk_modes: ["backtest", "paper", "train"]
    api_modes: ["realtime", "live"]
    api:
      base_url: "http://127.0.0.1:6900"
      timeout_ms: 1500
      manage_process: true
      startup_timeout_s: 20
  routing:
    market_data:
      weights:
        freshness: 0.20
        completeness: 0.40
        latency: 0.20
        reliability: 0.20
      provider_order: ["openbb_api", "openbb_sdk", "yfinance", "fallback"]
      timeout_ms: 1500
      min_score: 0.15
    fundamentals:
      weights:
        freshness: 0.20
        completeness: 0.45
        latency: 0.10
        reliability: 0.25
      provider_order: ["openbb_api", "openbb_sdk", "yfinance", "fallback"]
      timeout_ms: 1500
      min_score: 0.15
    news:
      weights:
        freshness: 0.35
        completeness: 0.25
        latency: 0.20
        reliability: 0.20
      provider_order: ["openbb_api", "openbb_sdk", "yfinance"]
      timeout_ms: 1500
      min_score: 0.10
    macro:
      weights:
        freshness: 0.25
        completeness: 0.35
        latency: 0.15
        reliability: 0.25
      provider_order: ["openbb_api", "openbb_sdk"]
      timeout_ms: 1500
      min_score: 0.10
    options:
      weights:
        freshness: 0.30
        completeness: 0.30
        latency: 0.15
        reliability: 0.25
      provider_order: ["openbb_api", "openbb_sdk", "yfinance"]
      timeout_ms: 1500
      min_score: 0.10
    insider:
      weights:
        freshness: 0.20
        completeness: 0.40
        latency: 0.10
        reliability: 0.30
      provider_order: ["openbb_api", "openbb_sdk", "fallback"]
      timeout_ms: 1500
      min_score: 0.10
    congress:
      weights:
        freshness: 0.20
        completeness: 0.40
        latency: 0.10
        reliability: 0.30
      provider_order: ["openbb_api", "openbb_sdk", "fallback"]
      timeout_ms: 1500
      min_score: 0.10
    earnings:
      weights:
        freshness: 0.20
        completeness: 0.40
        latency: 0.10
        reliability: 0.30
      provider_order: ["openbb_api", "openbb_sdk", "yfinance", "fallback"]
      timeout_ms: 1500
      min_score: 0.10

portfolio_allocator:
  mode: "dual_run_select_best"
  static_stack: "hrp_risk_parity_cvar_guard"
  alt_stack: "regime_switched_hrp_rp_cvar"
  cvar_alpha: 0.95
  cvar_guard_max_tail_loss: 0.06
  regime_gross_scale: 0.80
  vol_estimator:
    primary: "yang_zhang"
  constraints:
    long_short_enabled: true
    net_min: -0.20
    net_max: 0.20
    gross_max: 1.00
    max_position_abs: 0.10
  selector:
    window_cycles: 20
    switch_margin: 0.02
    min_hold_cycles: 5

# Backtesting
backtest:
  initial_capital: 100000
  commission_rate: 0.001  # 0.1% per trade
  slippage_bps: 5  # 5 basis points
  min_commission: 1.0

# Risk Management
risk:
  max_position_size: 0.05  # Max 5% per position
  max_portfolio_leverage: 1.10
  max_drawdown: 0.10  # 10% max drawdown
  max_daily_loss: 0.03
  max_weekly_loss: 0.07
  var_confidence: 0.95
  kelly_fraction: 0.6  # modest boost to sizing
  target_volatility: 0.15
  vol_of_vol_threshold: 0.03
  vol_of_vol_scale: 0.6
  dd_warning: 0.15
  dd_critical: 0.25
  dd_circuit_breaker: 0.35
  dd_max_limit: 0.45
  dd_min_exposure: 0.20
  dd_leverage_cap_warning: 1.00
  dd_leverage_cap_critical: 0.90
  market_off_leverage_cap: 1.00
  faster_derisk_warning_mult: 0.90
  faster_derisk_critical_mult: 0.80

# Strategy
strategy:
  lookback_window: 60
  signal_threshold: 0.28  # Min signal strength to trade
  rebalance_frequency: "weekly"
  paper_rebalance_frequency: "weekly"
  min_rebalance_notional_frac: 0.025
  momentum_top_pct: 80
  momentum_bottom_pct: 35
  relative_strength_top_n: 60
  relative_strength_min_mom: -0.02
  use_relative_strength: false
  liquid_subset_size: 200
  liquid_adv_window: 20
  liquid_min_history: 120
  liquid_for_full_only: true
  long_only: true
  risk_off_cash: false
  signal_scale: 1.2
  min_long_signal: 0.10
  market_off_scale: 0.80
  anchor_core_to_quant_composite: false
  alpha_deploy_requires_relative_edge: true
  alpha_edge_lookback_days: 63
  alpha_min_scale: 0.0
  alpha_info_floor: 0.0
  alpha_excess_floor: 0.0
  alpha_recovery_info: 0.25
  alpha_recovery_excess: 0.03
  sleeves:
    enabled: true
    core_budget: 1.00
    alpha_budget: 0.00
    lottery_budget: 0.00
    core_loss_scale: 1.00
    core_tilt_enabled: false
    core_tilt_lookback_days: 126
    core_tilt_strength: 0.35
    core_rebalance_band: 0.02
    alpha_min_confidence: 0.08
    lottery_top_n: 3
    lottery_min_signal: 0.35
    lottery_min_confidence: 0.25
    lottery_stop_loss: 0.08
    lottery_max_per_symbol: 0.0075
    core_mix:
      QQQ: 0.70
      IWM: 0.30

# Technical Indicators
indicators:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2
  atr_period: 14

# Logging
logging:
  level: "INFO"
  file: "quantum_alpha.log"

# Benchmarks
benchmarks:
  market: "SPY"
  quant_composite:
    - "QQQ"
    - "IWM"
  quant_firm_proxies:
    enabled: true
    profiles:
      - "aqr_style_factors"
      - "citadel_style_multistrat"
      - "two_sigma_style_data"
      - "de_shaw_style_macro"
      - "man_ahl_style_trend"
    min_assets: 2
    interval: "1d"

# Validation protocol
validation:
  mcpt_threshold_stage1: 0.10
  mcpt_threshold_stage2: 0.05
  rolling_oos_window_days: 126
  rolling_oos_min_windows: 3
  rolling_oos_min_beat_ratio: 0.75
  promotion_oos_required_windows: 4
  promotion_oos_required_beats: 3
  paper_min_bars: 120
  constraint_max_drawdown: 0.25
  constraint_beta_min: 0.8
  constraint_beta_max: 1.2
  constraint_min_information_ratio: 0.0
